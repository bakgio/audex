name: Feature Request
description: Suggest a new feature or enhancement for audex
title: "[Feature]: "
labels: ["C-feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe your idea so we can evaluate it.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of audex does this relate to?
      multiple: true
      options:
        - New audio format support
        - Existing format (tag reading)
        - Existing format (tag writing)
        - Stream info / metadata
        - API ergonomics
        - Async support
        - Serde / serialization
        - WASM bindings
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: |
        What problem does this feature solve? What use case does it enable?
        If this is related to a frustration, describe the experience.
      placeholder: "I'm trying to ... but currently audex doesn't support ..."
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: Importance
      description: How important is this feature to you?
      options:
        - Nice to have
        - Important — would improve my workflow
        - Blocking — I can't proceed without this
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        How do you think this should work? Include API sketches, pseudocode, or references to how other libraries handle this.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, references, or examples that support this request.
    validations:
      required: false
